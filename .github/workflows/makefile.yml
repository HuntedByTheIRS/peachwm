name: CI Build Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          tcc \
          clang \
          pkg-config \
          wayland-protocols \
          libwayland-dev \
          libwlroots-dev \
          libxkbcommon-dev \
          libinput-dev \
          liblua5.4-dev \
          libxcb1-dev \
          libxcb-icccm4-dev

    - name: Test 'make debug' (Clang + Sanitizers)
      run: |
        make debug
        make clean

    - name: Test Default 'make' (Auto-detecting TCC)
      run: |
        make
        make clean

    - name: Test 'make release' (Clang + Strict Warnings)
      run: |
        make release
